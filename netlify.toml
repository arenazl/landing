[build]
  publish = "."
  command = ""

# Permitir acceso directo a archivos SEO
[[redirects]]
  from = "/sitemap.xml"
  to = "/sitemap.xml"
  status = 200

[[redirects]]
  from = "/robots.txt"
  to = "/robots.txt"
  status = 200

# Pretty URLs para páginas SEO (sin .html)
[[redirects]]
  from = "/software-gestion-municipal"
  to = "/software-gestion-municipal.html"
  status = 200

[[redirects]]
  from = "/reclamos-vecinales"
  to = "/reclamos-vecinales.html"
  status = 200

[[redirects]]
  from = "/tramites-municipales"
  to = "/tramites-municipales.html"
  status = 200

[[redirects]]
  from = "/tesoreria"
  to = "/tesoreria.html"
  status = 200

[[redirects]]
  from = "/precios"
  to = "/precios.html"
  status = 200

[[redirects]]
  from = "/contacto"
  to = "/contacto.html"
  status = 200

# Fallback final: cualquier otra ruta cae al index
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200

# Security headers (Google los considera señal de confianza)
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "geolocation=(self), camera=(), microphone=()"
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache agresivo para imágenes y assets
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/*.svg"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Content-Type = "image/svg+xml"

# Cache para JS/CSS de la landing (assets versionados por contenido)
[[headers]]
  for = "/js/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"

[[headers]]
  for = "/css/*"
  [headers.values]
    Cache-Control = "public, max-age=604800"
